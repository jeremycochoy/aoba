<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#F4EFE6;}
  .frame{
    width:800px;height:800px;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 35% 30%, #FCF6E9 0%, #F4EFE6 55%, #EBE3D4 100%);
  }
  .wordmark{
    font-family:'Cormorant Garamond',Georgia,serif;
    font-weight:500;
    font-size:200px;
    color:#3F5A33;
    letter-spacing:-2px;
    line-height:1;
  }
  .accent{color:#5A7A4A;font-style:italic;}
  .underline{
    display:block;width:120px;height:2px;background:#C9A23B;margin:24px auto 0;
  }
</style>
</head>
<body>
<div class="frame">
  <div>
    <div class="wordmark">Matcha<span class="accent">é</span></div>
    <span class="underline"></span>
  </div>
</div>
</body></html>
